name: Django CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Pipenv
      run: pip install pipenv

    - name: Install Dependencies
      # Removed the trailing comment from the command line to prevent shell errors
      run: |
        pipenv install --dev --deploy

    - name: Check for Missing Migrations
      run: |
        pipenv run python manage.py makemigrations --check --dry-run

    - name: Run Tests
      run: |
        pipenv run python manage.py test report
