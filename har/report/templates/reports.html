{% load static %}
<!DOCTYPE html>
<html>
<head>
    <link href="{% static 'css/reports.css' %}" rel="stylesheet"/>
    <script src="{% static 'js/reports.js' %}"></script>
</head>
<body>
    <div class="list-container">
        <img class="logo" src="{% static 'img/logo_har.2.0.png' %}">
        {% for report in reports %}
        <div class="report-item">
            <img class="ic-heritage" src="{% static 'img/ic_heritage.png' %}"/>
            <div class="info">
                <strong>{{ report.name }}</strong>
                <p>({{ report.latitude }}, {{ report.longitude }}, {{ report.altitude }})</p>
            </div>
            <button onclick="onclickEditReport({{report.id}})">Edit</button>
            <button onclick="onclickDeleteReport({{report.id}})">Delete</button>
        </div>
        {% endfor %}
        <button class="add-btn" onclick="onclickAddReport()">Add Report</button>
    </div>
</body>
</html>
