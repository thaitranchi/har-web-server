{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>HAR - My Reports</title>
    <link href="{% static 'css/reports.css' %}" rel="stylesheet"/>
    <link href="{% static 'css/base.css' %}" rel="stylesheet"/>
    <script src="{% static 'js/reports.js' %}"></script>
    <meta charset="UTF-8">
</head>
<body>
    <div class="container">
        <img class="logo" src="{% static 'img/logo_har.2.0.png' %}" alt="Logo">
        <div class="card">
        
        {% for report in reports %}
        <div class="report-container"> <img class="ic-heritage" src="{% static 'img/ic_heritage.png' %}" alt="Icon"/>
            <div class="report-info"> <strong>{{ report.name }}</strong>
                <p>({{ report.latitude }}, {{ report.longitude }}, {{ report.altitude }})</p>
            </div>

            <div class="report-actions">
                <div class="edit-button" role="button" title="Edit report" onclick="onclickEditReport({{report.id}})">
                    <img class="edit-icon" src="{% static 'img/edit-icon.png' %}" alt="Edit">
                </div>
                <div class="delete-button" role="button" title="Delete report" onclick="onclickDeleteReport({{report.id}})">
                    <img class="delete-icon" src="{% static 'img/delete-icon.png' %}" alt="Delete">
                </div>
            </div>
        </div>
        {% empty %}
        <p>No reports found. Start by adding one below!</p>
        {% endfor %}

        <div style="text-align:center; margin-top:16px">
            <button class="button small" onclick="onclickAddReport()">Add Report</button>
        </div>
        </div>
    </div>
</body>
</html>
