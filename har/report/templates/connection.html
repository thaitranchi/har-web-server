{% load static %}
<!DOCTYPE html>
<html>
<head>
    <link href="{% static 'css/connection.css' %}" rel="stylesheet" />
</head>
<body class="connection-page">
    <img src="{% static 'img/logo_har.2.0.png' %}" class="logo">
    <form method="post">
        {% csrf_token %}
        {{ form.email }}
        {{ form.password }}
        {% if error %}<p class="error">{{ error }}</p>{% endif %}
        <button type="submit">Connect</button>
    </form>
    <p>New here? An account will be created automatically.</p>
</body>
</html>
